stages:
  - sync


# GitLab → GitHub 동기화 (GitLab에서 push될 때마다)
sync_to_github:
  stage: sync
  image: alpine/git:latest
  before_script:
    - apk add --no-cache git
  script:
  - git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/Chihwan-An/SKNano-plot.git || true
  - git fetch origin
  - git checkout -B $CI_COMMIT_REF_NAME origin/$CI_COMMIT_REF_NAME
  - git push github $CI_COMMIT_REF_NAME --force
  only:
    - main
    - develop
  when: on_success
  after_script:
  - apk add --no-cache curl
  - |
    if [ "$CI_JOB_STATUS" = "success" ]; then
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d "chat_id=$chat_id" \
        -d "text=CI/CD 성공: $CI_PROJECT_NAME - $CI_COMMIT_REF_NAME"
    else
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d "chat_id=$chat_id" \
        -d "text=CI/CD 실패: $CI_PROJECT_NAME - $CI_COMMIT_REF_NAME"
    fi

# 원본 레포에서 변경사항 가져오기 (수동 트리거 또는 스케줄)
sync_from_upstream:
  stage: sync
  image: alpine/git:latest
  before_script:
    - apk add --no-cache git
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
  script:
    - git remote add upstream https://github.com/choij1589/SKNanoAnalyzer.git || true
    - git fetch upstream
    - git checkout main
    - git merge upstream/main --no-edit || echo "No changes to merge"
    - git push origin main
  only:
    - schedules
    - web
  when: manual
  after_script:
  - apk add --no-cache curl
  - |
    if [ "$CI_JOB_STATUS" = "success" ]; then
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d "chat_id=$chat_id" \
        -d "text=CI/CD 성공: $CI_PROJECT_NAME - $CI_COMMIT_REF_NAME"
    else
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d "chat_id=$chat_id" \
        -d "text=CI/CD 실패: $CI_PROJECT_NAME - $CI_COMMIT_REF_NAME"
    fi

