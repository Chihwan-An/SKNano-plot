stages:
  - deploy

deploy-plots:
  stage: deploy
  image: python:3.11-slim

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$LXPLUS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H lxplus.cern.ch >> ~/.ssh/known_hosts

  script:
    - |
      rsync -avz --delete \
        -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
        ./ \
        achihwan@lxplus.cern.ch:/eos/user/a/achihwan/www/plots/